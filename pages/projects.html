<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — Dellus</title>
    <style>
        /* === RESET & BASE === */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            background: #f5fccc;
            color: #000000;
            font-family: 'Courier New', Courier, monospace;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            cursor: default;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* === PAGE LAYOUT === */
        .page {
            display: flex;
            height: 100vh;
            width: 100%;
            position: relative;
        }

        /* === LEFT PANEL === */
        .left-panel {
            width: 38%;
            min-width: 14px;
            max-width: 70%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            overflow: hidden;
            /* Gradient fade-mask on the right edge — applied dynamically by JS */
        }

        /* === TOP ROW NAV (Home, About, Contact, CV) === */
        .top-row-nav {
            padding: 18px 28px 0 28px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 4px 16px;
            flex-shrink: 0;
        }

        .top-row-nav.collapsed-column {
            flex-direction: column;
            gap: 2px;
        }

        .top-row-item {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.55rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.25s ease, font-weight 0.2s ease, opacity 0.4s ease, transform 0.4s ease;
            user-select: none;
            opacity: 0;
            transform: translateY(-4px);
        }

        .top-row-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .top-row-item:hover {
            font-weight: bold;
        }

        /* === LEFT CONTENT AREA === */
        .left-content {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            padding: 0 28px;
            overflow-y: auto;
            scrollbar-width: none;
            max-height: 60vh;
        }

        .left-content::-webkit-scrollbar {
            display: none;
        }

        /* ============================
           VIEW 1 — CATEGORIES
           ============================ */
        .categories-view {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* Projects label: same size as landing words, not bold, dimmed */
        .page-label {
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(0.75rem, 1.8vmin, 1.1rem);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            line-height: 1.4;
            opacity: 0.35;
            margin-bottom: 4px;
            cursor: default;
            user-select: none;
            font-weight: normal;
        }

        .category-item {
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(0.75rem, 1.8vmin, 1.1rem);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: color 0.25s ease, font-weight 0.2s ease;
            line-height: 1.4;
            user-select: none;
            font-weight: normal;
        }

        .category-item:hover {
            font-weight: bold;
        }

        .category-item.dimmed {
            color: #bbb;
        }

        .category-item.dimmed:hover {
            color: #888;
            font-weight: bold;
        }

        /* ============================
           VIEW 2 — YEAR / PROJECT LIST
           ============================ */
        .projects-list-view {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .view2-page-label {
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(0.75rem, 1.8vmin, 1.1rem);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            line-height: 1.4;
            opacity: 0.35;
            margin-bottom: 4px;
            cursor: pointer;
            user-select: none;
            font-weight: normal;
            transition: opacity 0.2s ease;
        }

        .view2-page-label:hover {
            opacity: 0.55;
        }

        .category-header {
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(0.75rem, 1.8vmin, 1.1rem);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: bold;
            margin-bottom: 16px;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .category-header:hover {
            opacity: 0.5;
        }

        .year-group {
            margin-bottom: 14px;
        }

        .year-label {
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.4;
            margin-bottom: 4px;
        }

        .project-list-item {
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(0.65rem, 1.4vmin, 0.9rem);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: color 0.25s ease, font-weight 0.2s ease;
            line-height: 1.5;
            padding: 2px 0;
            user-select: none;
        }

        .project-list-item:hover {
            font-weight: bold;
        }

        /* ============================
           VIEW 3 — PROJECT DETAIL
           ============================ */
        .project-detail-view {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .breadcrumb {
            font-size: 0.55rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.45;
            margin-bottom: 20px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .breadcrumb-link {
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .breadcrumb-link:hover {
            opacity: 0.6;
        }

        .detail-title {
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(1.2rem, 2.2vw, 1.8rem);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            line-height: 1.2;
            margin-bottom: 24px;
        }

        .detail-meta {
            display: flex;
            flex-direction: column;
            gap: 0;
            margin-bottom: 24px;
        }

        .meta-row {
            display: flex;
            align-items: baseline;
            padding: 6px 0;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        .meta-label {
            font-size: 0.5rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            width: 90px;
            flex-shrink: 0;
            opacity: 0.4;
        }

        .meta-value {
            font-size: 0.65rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .detail-text {
            font-size: 0.68rem;
            line-height: 1.8;
            letter-spacing: 0.015em;
            opacity: 0.8;
            max-width: 400px;
        }

        .detail-tags {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .tag {
            font-size: 0.45rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 3px 8px;
            border: 1px solid rgba(0,0,0,0.2);
        }

        /* === DIVIDER === */
        .divider {
            width: 1px;
            height: 100vh;
            background: #000;
            position: relative;
            cursor: col-resize;
            flex-shrink: 0;
            z-index: 100;
            user-select: none;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 0;
            left: -8px;
            width: 17px;
            height: 100%;
            cursor: col-resize;
        }

        .divider-handle {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.55rem;
            letter-spacing: 0.05em;
            color: #000;
            opacity: 0.25;
            pointer-events: none;
            transition: opacity 0.2s ease;
            white-space: nowrap;
            background: #f5fccc;
            padding: 6px 2px;
        }

        .divider:hover .divider-handle {
            opacity: 0.6;
        }

        .divider.dragging .divider-handle {
            opacity: 0.8;
        }

        /* === RIGHT PANEL === */
        .right-panel {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            background: #f5fccc;
            scrollbar-width: none;
        }

        .right-panel::-webkit-scrollbar {
            display: none;
        }

        /* === SCATTER GALLERY === */
        .gallery-scatter {
            position: relative;
            width: 100%;
            min-height: 100vh;
            padding: 30px;
        }

        .scatter-item {
            position: absolute;
            cursor: pointer;
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            opacity: 0;
            transform: translateY(10px);
        }

        .scatter-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .scatter-item:hover {
            z-index: 50;
        }

        .scatter-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: filter 0.3s ease, transform 0.35s ease;
        }

        .scatter-item:hover .scatter-img {
            transform: scale(1.02);
            filter: contrast(1.08);
        }

        .scatter-tooltip {
            position: absolute;
            bottom: -8px;
            left: 0;
            transform: translateY(100%);
            background: #000;
            color: #f5fccc;
            padding: 8px 12px;
            font-size: 0.5rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 60;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .scatter-item:hover .scatter-tooltip {
            opacity: 1;
            pointer-events: auto;
        }

        .scatter-tooltip-arrow {
            font-size: 0.6rem;
            transition: transform 0.2s ease;
        }

        .scatter-tooltip:hover .scatter-tooltip-arrow {
            transform: translateX(3px);
        }

        /* === PRESENTATION MODE === */
        .gallery-presentation {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .presentation-img-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .presentation-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.4s ease;
        }

        .presentation-counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.5rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.35;
        }

        .presentation-label {
            position: absolute;
            bottom: 38px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.5;
        }

        .presentation-hint {
            position: absolute;
            top: 20px;
            right: 24px;
            font-size: 0.45rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0.2;
        }

        /* === TRANSITIONS === */
        .view-enter {
            animation: viewFadeIn 0.4s ease forwards;
        }

        @keyframes viewFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body.resizing {
            cursor: col-resize;
            user-select: none;
        }

        body.resizing .left-panel,
        body.resizing .right-panel {
            pointer-events: none;
        }

        /* === PAGE TRANSITION GHOSTS === */
        .transition-ghost {
            position: fixed;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
            z-index: 9999;
            pointer-events: none;
            will-change: transform, opacity;
        }

        /* Hide real elements during transition */
        body.transitioning .top-row-nav,
        body.transitioning .left-content {
            visibility: hidden;
        }

        body.transitioning .divider,
        body.transitioning .right-panel {
            opacity: 0;
        }

        /* Fade in divider + right panel after transition */
        .divider.transition-reveal,
        .right-panel.transition-reveal {
            transition: opacity 0.4s ease;
            opacity: 1 !important;
        }

        .categories-view.transition-reveal {
            visibility: visible !important;
        }
    </style>
</head>

    // ============================================

    // ============================================
    function getAllProjects() {
        const all = [];
        data.categories.forEach(cat => {
            cat.years.forEach(yg => {
                yg.projects.forEach(p => {
                    all.push({ ...p, categoryName: cat.name, categoryColor: cat.color });
                });
            });
        });
        return all;
    }

    function getCategoryProjects(catName) {
        const cat = data.categories.find(c => c.name === catName);
        if (!cat) return [];
        const all = [];
        cat.years.forEach(yg => {
            yg.projects.forEach(p => {
                all.push({ ...p, categoryName: cat.name, categoryColor: cat.color });
            });
        });
        return all;
    }

    function generateScatter(count) {
        const positions = [];
        const sizePresets = [
            { wPct: 40, h: 280 }, { wPct: 28, h: 210 }, { wPct: 34, h: 250 },
            { wPct: 22, h: 190 }, { wPct: 45, h: 300 }, { wPct: 26, h: 230 },
            { wPct: 38, h: 260 }, { wPct: 30, h: 200 },
        ];
        let currentTop = 20;
        for (let i = 0; i < count; i++) {
            const preset = sizePresets[i % sizePresets.length];
            const leftBias = (i % 2 === 0) ? 3 + Math.random() * 15 : 50 + Math.random() * 15;
            const left = Math.max(2, Math.min(96 - preset.wPct, leftBias + (Math.random() - 0.5) * 10));
            const gap = 30 + Math.random() * 50;
            positions.push({
                left, top: currentTop,
                width: preset.wPct,
                height: preset.h + (Math.random() - 0.5) * 40,
            });
            currentTop += preset.h * 0.7 + gap;
        }
        return positions;
    }

    // ============================================
    // RENDER TOP ROW NAV
    // ============================================
    function renderTopRowNav() {
        const nav = document.getElementById('topRowNav');
        nav.innerHTML = '';

        const hasTransition = sessionStorage.getItem('nav-transition');
        if (hasTransition) sessionStorage.removeItem('nav-transition');
        const baseDelay = hasTransition ? 0 : 150;

        topRowWords.forEach((word, i) => {
            const item = document.createElement('a');
            item.classList.add('top-row-item');
            item.textContent = word.text;
            item.setAttribute('data-fulltext', word.text);
            item.href = word.link;

            item.addEventListener('mouseenter', () => {
                item.style.color = word.color;
            });
            item.addEventListener('mouseleave', () => {
                item.style.color = '';
            });

            nav.appendChild(item);

            setTimeout(() => {
                item.classList.add('visible');
                if (window._truncateAll) window._truncateAll();
            }, baseDelay + (i * 70));
        });
    }

    // ============================================
    // VIEW 1
    // ============================================

        currentView = 1;
        selectedCategory = null;
        selectedProject = null;

        const left = document.getElementById('leftContent');
        left.innerHTML = '';

        const wrap = document.createElement('div');
        wrap.classList.add('categories-view');

        const hasTransition = !document.querySelector('.top-row-item.visible');
        const baseDelay = hasTransition ? 400 : 0;

        // "Projects" — same size as categories, dimmed, not bold
        const projectsLabel = document.createElement('div');
        projectsLabel.classList.add('page-label', 'view-enter');
        projectsLabel.style.animationDelay = baseDelay + 'ms';
        projectsLabel.textContent = 'Projects';
        projectsLabel.setAttribute('data-fulltext', 'Projects');
        wrap.appendChild(projectsLabel);

        data.categories.forEach((cat, i) => {
            const item = document.createElement('div');
            item.classList.add('category-item', 'view-enter');
            item.style.animationDelay = (baseDelay + 80 + (i * 70)) + 'ms';
            item.textContent = cat.name;
            item.setAttribute('data-fulltext', cat.name);
            item.addEventListener('mouseenter', () => { item.style.color = cat.color; });
            item.addEventListener('mouseleave', () => { item.style.color = ''; });
            item.addEventListener('click', () => { renderView2(cat.name); });
            wrap.appendChild(item);
        });

        left.appendChild(wrap);
        renderScatterGallery(getAllProjects(), baseDelay + 200);
        requestAnimationFrame(() => { if (window._truncateAll) window._truncateAll(); });
    }

    // ============================================
    // VIEW 2
    // ============================================
    function renderView2(categoryName) {
        currentView = 2;
        selectedCategory = categoryName;
        selectedProject = null;

        const left = document.getElementById('leftContent');
        left.innerHTML = '';

        const wrap = document.createElement('div');
        wrap.classList.add('projects-list-view');
        let delay = 0;

        const projectsLabel = document.createElement('div');
        projectsLabel.classList.add('view2-page-label', 'view-enter');
        projectsLabel.style.animationDelay = delay + 'ms';
        projectsLabel.textContent = 'Projects';
        projectsLabel.setAttribute('data-fulltext', 'Projects');
        projectsLabel.addEventListener('click', () => renderView1());
        wrap.appendChild(projectsLabel);
        delay += 60;

        data.categories.forEach((c) => {
            if (c.name === categoryName) {
                const header = document.createElement('div');
                header.classList.add('category-header', 'view-enter');
                header.style.animationDelay = delay + 'ms';
                header.textContent = c.name;
                header.setAttribute('data-fulltext', c.name);
                header.addEventListener('click', () => renderView1());
                wrap.appendChild(header);
                delay += 60;

                c.years.forEach((yg) => {
                    const yearGroup = document.createElement('div');
                    yearGroup.classList.add('year-group', 'view-enter');
                    yearGroup.style.animationDelay = delay + 'ms';
                    delay += 60;

                    const yearLabel = document.createElement('div');
                    yearLabel.classList.add('year-label');
                    yearLabel.textContent = yg.year;
                    yearLabel.setAttribute('data-fulltext', yg.year);
                    yearGroup.appendChild(yearLabel);

                    yg.projects.forEach(p => {
                        const pItem = document.createElement('div');
                        pItem.classList.add('project-list-item');
                        pItem.textContent = p.title;
                        pItem.setAttribute('data-fulltext', p.title);
                        pItem.addEventListener('mouseenter', () => { pItem.style.color = c.color; });
                        pItem.addEventListener('mouseleave', () => { pItem.style.color = ''; });
                        pItem.addEventListener('click', () => { renderView3(p, c); });
                        yearGroup.appendChild(pItem);
                    });
                    wrap.appendChild(yearGroup);
                });
            } else {
                const header = document.createElement('div');
                header.classList.add('category-item', 'dimmed', 'view-enter');
                header.style.animationDelay = delay + 'ms';
                header.textContent = c.name;
                header.setAttribute('data-fulltext', c.name);
                header.addEventListener('click', () => renderView2(c.name));
                wrap.appendChild(header);
                delay += 60;
            }
        });

        left.appendChild(wrap);
        renderScatterGallery(getCategoryProjects(categoryName), 100);
        requestAnimationFrame(() => { if (window._truncateAll) window._truncateAll(); });
    }

    // ============================================
    // VIEW 3
    // ============================================
    function renderView3(project, category) {
        currentView = 3;
        selectedProject = project;
        presentationIndex = 0;

        const left = document.getElementById('leftContent');
        left.innerHTML = '';

        const wrap = document.createElement('div');
        wrap.classList.add('project-detail-view');

        const breadcrumb = document.createElement('div');
        breadcrumb.classList.add('breadcrumb', 'view-enter');
        breadcrumb.style.animationDelay = '0ms';

        const bcAll = document.createElement('span');
        bcAll.classList.add('breadcrumb-link');
        bcAll.textContent = 'Projects';
        bcAll.setAttribute('data-fulltext', 'Projects');
        bcAll.addEventListener('click', () => renderView1());
        breadcrumb.appendChild(bcAll);
        breadcrumb.appendChild(document.createTextNode(' / '));

        const bcCat = document.createElement('span');
        bcCat.classList.add('breadcrumb-link');
        bcCat.textContent = category.name;
        bcCat.setAttribute('data-fulltext', category.name);
        bcCat.addEventListener('click', () => renderView2(category.name));
        breadcrumb.appendChild(bcCat);
        breadcrumb.appendChild(document.createTextNode(' / '));

        const bcProject = document.createElement('span');
        bcProject.textContent = project.title;
        bcProject.setAttribute('data-fulltext', project.title);
        breadcrumb.appendChild(bcProject);
        wrap.appendChild(breadcrumb);

        const title = document.createElement('div');
        title.classList.add('detail-title', 'view-enter');
        title.style.animationDelay = '60ms';
        title.textContent = project.title;
        title.setAttribute('data-fulltext', project.title);
        wrap.appendChild(title);

        const meta = document.createElement('div');
        meta.classList.add('detail-meta', 'view-enter');
        meta.style.animationDelay = '120ms';
        [
            { label: 'Year', value: project.year },
            { label: 'Location', value: project.location },
            { label: 'With', value: project.participants },
            { label: 'Type', value: project.type },
        ].forEach(f => {
            const row = document.createElement('div');
            row.classList.add('meta-row');
            const labelSpan = document.createElement('span');
            labelSpan.classList.add('meta-label');
            labelSpan.textContent = f.label;
            labelSpan.setAttribute('data-fulltext', f.label);
            const valueSpan = document.createElement('span');
            valueSpan.classList.add('meta-value');
            valueSpan.textContent = f.value;
            valueSpan.setAttribute('data-fulltext', f.value);
            row.appendChild(labelSpan);
            row.appendChild(valueSpan);
            meta.appendChild(row);
        });
        wrap.appendChild(meta);

        const text = document.createElement('div');
        text.classList.add('detail-text', 'view-enter');
        text.style.animationDelay = '180ms';
        text.textContent = project.description;
        text.setAttribute('data-fulltext', project.description);
        wrap.appendChild(text);

        const tags = document.createElement('div');
        tags.classList.add('detail-tags', 'view-enter');
        tags.style.animationDelay = '240ms';
        project.tags.forEach(t => {
            const tag = document.createElement('span');
            tag.classList.add('tag');
            tag.textContent = t;
            tag.setAttribute('data-fulltext', t);
            tags.appendChild(tag);
        });
        wrap.appendChild(tags);

        left.appendChild(wrap);
        renderPresentationGallery(project);
        requestAnimationFrame(() => { if (window._truncateAll) window._truncateAll(); });
    }

    // ============================================
    // SCATTER GALLERY
    // ============================================
    function renderScatterGallery(projects, delay) {
        delay = delay || 0;
        const panel = document.getElementById('rightPanel');
        panel.innerHTML = '';
        panel.scrollTop = 0;

        const canvas = document.createElement('div');
        canvas.classList.add('gallery-scatter');

        const items = projects.map(p => ({
            src: p.keyImage, label: p.title, project: p,
            category: data.categories.find(c => c.name === p.categoryName),
        }));

        const positions = generateScatter(items.length);
        let maxBottom = 0;

        items.forEach((item, index) => {
            const pos = positions[index];
            const bottom = pos.top + pos.height + 40;
            if (bottom > maxBottom) maxBottom = bottom;

            const el = document.createElement('div');
            el.classList.add('scatter-item');
            el.style.left = pos.left + '%';
            el.style.top = pos.top + 'px';
            el.style.width = pos.width + '%';
            el.style.height = pos.height + 'px';

            const img = document.createElement('img');
            img.classList.add('scatter-img');
            img.src = item.src;
            img.alt = item.label;
            img.loading = 'lazy';
            el.appendChild(img);

            const tooltip = document.createElement('div');
            tooltip.classList.add('scatter-tooltip');
            tooltip.innerHTML = `${item.label} <span class="scatter-tooltip-arrow">&rarr;</span>`;
            el.appendChild(tooltip);

            el.addEventListener('click', () => { renderView3(item.project, item.category); });
            canvas.appendChild(el);

            setTimeout(() => { el.classList.add('visible'); }, delay + 150 + (index * 100));
        });

        canvas.style.minHeight = maxBottom + 60 + 'px';
        panel.appendChild(canvas);
    }

    // ============================================
    // PRESENTATION GALLERY
    // ============================================
    function renderPresentationGallery(project) {
        const panel = document.getElementById('rightPanel');
        panel.innerHTML = '';
        panel.scrollTop = 0;

        const wrap = document.createElement('div');
        wrap.classList.add('gallery-presentation');

        const imgWrap = document.createElement('div');
        imgWrap.classList.add('presentation-img-wrapper');

        const img = document.createElement('img');
        img.classList.add('presentation-img');
        img.src = project.images[0].src;
        img.alt = project.images[0].label;
        imgWrap.appendChild(img);
        wrap.appendChild(imgWrap);

        const label = document.createElement('div');
        label.classList.add('presentation-label');
        label.textContent = project.images[0].label;
        wrap.appendChild(label);

        const counter = document.createElement('div');
        counter.classList.add('presentation-counter');
        counter.textContent = `1 / ${project.images.length}`;
        wrap.appendChild(counter);

        if (project.images.length > 1) {
            const hint = document.createElement('div');
            hint.classList.add('presentation-hint');
            hint.textContent = 'Scroll to navigate';
            wrap.appendChild(hint);
        }

        function updateImage() {
            img.style.opacity = 0;
            setTimeout(() => {
                img.src = project.images[presentationIndex].src;
                img.alt = project.images[presentationIndex].label;
                label.textContent = project.images[presentationIndex].label;
                counter.textContent = `${presentationIndex + 1} / ${project.images.length}`;
                img.style.opacity = 1;
            }, 200);
        }

        let scrollCooldown = false;
        wrap.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (scrollCooldown) return;
            scrollCooldown = true;
            if (e.deltaY > 0) presentationIndex = Math.min(presentationIndex + 1, project.images.length - 1);
            else presentationIndex = Math.max(presentationIndex - 1, 0);
            updateImage();
            setTimeout(() => { scrollCooldown = false; }, 500);
        }, { passive: false });

        const keyHandler = (e) => {
            if (currentView !== 3) { document.removeEventListener('keydown', keyHandler); return; }
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                presentationIndex = Math.min(presentationIndex + 1, project.images.length - 1);
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                presentationIndex = Math.max(presentationIndex - 1, 0);
            } else return;
            updateImage();
        };
        document.addEventListener('keydown', keyHandler);

        panel.appendChild(wrap);
    }

    // ============================================
    // RESIZABLE DIVIDER + UNIFIED TRUNCATION
    // ============================================
    (function initResizer() {
        const divider = document.getElementById('divider');
        const leftPanel = document.getElementById('leftPanel');
        const topRowNav = document.getElementById('topRowNav');
        const page = document.querySelector('.page');
        let isDragging = false;

        // Character width cache
        const charMeasureCache = {};
        function getCharWidth(fontSize) {
            if (charMeasureCache[fontSize]) return charMeasureCache[fontSize];
            const span = document.createElement('span');
            span.style.fontFamily = "'Courier New', Courier, monospace";
            span.style.fontSize = fontSize;
            span.style.letterSpacing = '0.05em';
            span.style.textTransform = 'uppercase';
            span.style.position = 'absolute';
            span.style.visibility = 'hidden';
            span.textContent = 'M';
            document.body.appendChild(span);
            const w = span.getBoundingClientRect().width;
            document.body.removeChild(span);
            charMeasureCache[fontSize] = w;
            return w;
        }

        // Threshold where top nav switches to column
        const NAV_COLUMN_THRESHOLD = 160;

        function truncateAll() {
            const panelWidth = leftPanel.getBoundingClientRect().width;
            const padding = 28;
            const available = panelWidth - padding - 4;

            // === Top nav: switch to column when narrow enough ===
            if (panelWidth <= NAV_COLUMN_THRESHOLD) {
                topRowNav.classList.add('collapsed-column');
            } else {
                topRowNav.classList.remove('collapsed-column');
            }

            // === Truncate ALL elements with data-fulltext uniformly ===
            const allEls = leftPanel.querySelectorAll('[data-fulltext]');
            allEls.forEach(el => {
                const fullText = el.getAttribute('data-fulltext');
                const fontSize = window.getComputedStyle(el).fontSize;
                const charW = getCharWidth(fontSize);

                if (available <= charW) {
                    // Show only first letter
                    el.textContent = fullText.charAt(0);
                    return;
                }

                const maxChars = Math.max(1, Math.floor(available / charW));

                if (maxChars >= fullText.length) {
                    el.textContent = fullText;
                } else {
                    el.textContent = fullText.substring(0, Math.max(1, maxChars));
                }
            });
        }

        // Min width = padding + widest single character (from the largest font size)
        function getMinWidth() {
            // Measure at the main content font size (the largest)
            const testEl = document.querySelector('.page-label, .category-item');
            if (testEl) {
                const fontSize = window.getComputedStyle(testEl).fontSize;
                const charW = getCharWidth(fontSize);
                return padding + charW + 6;
            }
            return 42;
        }

        const padding = 28;

        function onStart(e) {
            isDragging = true;
            document.body.classList.add('resizing');
            divider.classList.add('dragging');
            e.preventDefault();
        }

        function onMove(clientX) {
            if (!isDragging) return;
            const pageWidth = page.getBoundingClientRect().width;
            const pct = (clientX / pageWidth) * 100;
            const minPx = getMinWidth();
            const minPct = (minPx / pageWidth) * 100;
            const clamped = Math.max(minPct, Math.min(70, pct));
            leftPanel.style.width = clamped + '%';
            truncateAll();
        }

        function onEnd() {
            if (!isDragging) return;
            isDragging = false;
            document.body.classList.remove('resizing');
            divider.classList.remove('dragging');
        }

        divider.addEventListener('mousedown', onStart);
        document.addEventListener('mousemove', (e) => onMove(e.clientX));
        document.addEventListener('mouseup', onEnd);
        divider.addEventListener('touchstart', onStart, { passive: false });
        document.addEventListener('touchmove', (e) => { if (isDragging) onMove(e.touches[0].clientX); }, { passive: false });
        document.addEventListener('touchend', onEnd);

        window._truncateAll = truncateAll;

        window.addEventListener('resize', () => {
            requestAnimationFrame(truncateAll);
        });
    })();

    // ============================================
    // INIT — SEAMLESS TRANSITION FROM LANDING
    // ============================================
    const hasTransition = sessionStorage.getItem('nav-transition');
    const storedPositions = sessionStorage.getItem('nav-transition-positions');

    if (hasTransition && storedPositions) {
        sessionStorage.removeItem('nav-transition');
        sessionStorage.removeItem('nav-transition-positions');

        const positions = JSON.parse(storedPositions);

        // Mark body as transitioning (hides real elements)
        document.body.classList.add('transitioning');

        // Narrow left panel on arrival — text-only, gallery fills the right
        document.getElementById('leftPanel').style.width = '8%';

        // Render normally (but hidden via CSS)
        renderTopRowNav();
        renderView1();

        // Force layout so elements have their final positions
        document.body.offsetHeight;

        // Make top-row-items visible immediately (they start with opacity:0)
        document.querySelectorAll('.top-row-item').forEach(el => {
            el.classList.add('visible');
            el.style.transition = 'none';
        });

        // Remove view-enter animations from left content
        document.querySelectorAll('.view-enter').forEach(el => {
            el.style.animation = 'none';
            el.style.opacity = '1';
            el.style.transform = 'none';
        });

        // Force another layout pass
        document.body.offsetHeight;

        // Create ghost elements at the stored (landing page exit) positions
        const ghosts = [];

        // Ghost for each nav word that has a stored position
        const navItems = document.querySelectorAll('.top-row-item');
        navItems.forEach(navEl => {
            const text = navEl.getAttribute('data-fulltext') || navEl.textContent;
            const stored = positions[text];
            if (!stored) return;

            const ghost = document.createElement('div');
            ghost.classList.add('transition-ghost');
            ghost.textContent = text;
            ghost.style.fontSize = '0.55rem';
            ghost.style.letterSpacing = '0.1em';
            ghost.style.left = stored.left + 'px';
            ghost.style.top = stored.top + 'px';
            document.body.appendChild(ghost);

            ghosts.push({ ghost, targetEl: navEl, text, role: 'nav' });
        });

        // Ghost for the clicked word — "Projects" label in the content
        const projectsLabel = document.querySelector('.page-label');
        const clickedText = Object.keys(positions).find(k => positions[k].role === 'clicked');
        if (clickedText && positions[clickedText] && projectsLabel) {
            const stored = positions[clickedText];
            const ghost = document.createElement('div');
            ghost.classList.add('transition-ghost');
            ghost.textContent = clickedText;
            // Use the landing page word size (same as projects page content size)
            ghost.style.fontSize = 'clamp(0.75rem, 1.8vmin, 1.1rem)';
            ghost.style.letterSpacing = '0.05em';
            ghost.style.left = stored.left + 'px';
            ghost.style.top = stored.top + 'px';
            document.body.appendChild(ghost);

            ghosts.push({ ghost, targetEl: projectsLabel, text: clickedText, role: 'clicked' });
        }

        // Also create ghosts for category items (Academic, Employment) — fade in
        const catItems = document.querySelectorAll('.category-item');
        catItems.forEach(catEl => {
            // These don't have stored positions — they'll just fade in
        });

        // Next frame: animate ghosts to real element positions
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                ghosts.forEach(({ ghost, targetEl }) => {
                    const targetRect = targetEl.getBoundingClientRect();
                    const ghostRect = ghost.getBoundingClientRect();

                    const deltaX = targetRect.left - ghostRect.left;
                    const deltaY = targetRect.top - ghostRect.top;

                    ghost.style.transition = 'transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.45s ease';
                    ghost.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                });

                // After ghosts arrive, reveal real elements and remove ghosts
                setTimeout(() => {
                    document.body.classList.remove('transitioning');

                    // Make top row nav visible
                    document.querySelectorAll('.top-row-item').forEach(el => {
                        el.style.transition = '';
                    });

                    // Fade in divider + right panel
                    document.getElementById('divider').classList.add('transition-reveal');
                    document.getElementById('rightPanel').classList.add('transition-reveal');

                    // Fade in category items that weren't part of the transition
                    const catItems = document.querySelectorAll('.category-item');
                    catItems.forEach((item, i) => {
                        item.style.animation = 'none';
                        item.style.opacity = '0';
                        item.style.transform = 'translateY(6px)';
                        item.offsetHeight; // force reflow
                        item.style.transition = `opacity 0.35s ease ${i * 0.06}s, transform 0.35s ease ${i * 0.06}s`;
                        item.style.opacity = '1';
                        item.style.transform = 'translateY(0)';
                    });

                    // Fade out and remove ghosts
                    ghosts.forEach(({ ghost }) => {
                        ghost.style.transition = 'opacity 0.15s ease';
                        ghost.style.opacity = '0';
                        setTimeout(() => ghost.remove(), 150);
                    });

                    // Clean up transition-reveal classes after transition
                    setTimeout(() => {
                        document.getElementById('divider').classList.remove('transition-reveal');
                        document.getElementById('rightPanel').classList.remove('transition-reveal');
                    }, 500);

                    if (window._truncateAll) window._truncateAll();
                }, 470);
            });
        });

    } else {
        // Normal load (no transition from landing)
        if (hasTransition) sessionStorage.removeItem('nav-transition');
        renderTopRowNav();
        renderView1();
    }

    </script>
