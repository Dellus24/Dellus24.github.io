<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — Dellus</title>
    <style>
        /* === RESET & BASE === */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            background: #f5fccc;
            color: #000000;
            font-family: 'Courier New', Courier, monospace;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            cursor: default;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* === PAGE LAYOUT === */
        .page {
            display: flex;
            height: 100vh;
            width: 100%;
            position: relative;
        }

        /* === LEFT PANEL === */
        .left-panel {
            width: 38%;
            min-width: 220px;
            max-width: 70%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            overflow: hidden;
        }

        /* === BACK NAV === */
        .back-nav {
            padding: 20px 28px 12px 28px;
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .back-link {
            transition: opacity 0.2s ease;
            cursor: pointer;
        }

        .back-link:hover {
            opacity: 0.35;
        }

        /* === LEFT CONTENT AREA === */
        .left-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 28px;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .left-content::-webkit-scrollbar {
            display: none;
        }

        /* ============================
           VIEW 1 — CATEGORIES
           ============================ */
        .categories-view {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .category-item {
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(1rem, 2.2vw, 1.6rem);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: color 0.25s ease, font-weight 0.2s ease;
            line-height: 1.4;
            user-select: none;
        }

        .category-item:hover {
            font-weight: bold;
            color: #569CD6;
        }

        .category-item.active {
            font-weight: bold;
        }

        .category-item.dimmed {
            color: #bbb;
        }

        .category-item.dimmed:hover {
            color: #888;
            font-weight: bold;
        }

        /* ============================
           VIEW 2 — YEAR / PROJECT LIST
           ============================ */
        .projects-list-view {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .category-header {
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(1rem, 2.2vw, 1.6rem);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-weight: bold;
            margin-bottom: 20px;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .category-header:hover {
            opacity: 0.5;
        }

        .year-group {
            margin-bottom: 16px;
        }

        .year-label {
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.4;
            margin-bottom: 4px;
        }

        .project-list-item {
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(0.75rem, 1.5vw, 1rem);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: color 0.25s ease, font-weight 0.2s ease;
            line-height: 1.5;
            padding: 2px 0;
            user-select: none;
        }

        .project-list-item:hover {
            font-weight: bold;
            color: #569CD6;
        }

        /* ============================
           VIEW 3 — PROJECT DETAIL
           ============================ */
        .project-detail-view {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .breadcrumb {
            font-size: 0.55rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.45;
            margin-bottom: 20px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .breadcrumb-link {
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .breadcrumb-link:hover {
            opacity: 0.6;
        }

        .detail-title {
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(1.2rem, 2.2vw, 1.8rem);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            line-height: 1.2;
            margin-bottom: 24px;
        }

        .detail-meta {
            display: flex;
            flex-direction: column;
            gap: 0;
            margin-bottom: 24px;
        }

        .meta-row {
            display: flex;
            align-items: baseline;
            padding: 6px 0;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        .meta-label {
            font-size: 0.5rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            width: 90px;
            flex-shrink: 0;
            opacity: 0.4;
        }

        .meta-value {
            font-size: 0.65rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .detail-text {
            font-size: 0.68rem;
            line-height: 1.8;
            letter-spacing: 0.015em;
            opacity: 0.8;
            max-width: 400px;
        }

        .detail-tags {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .tag {
            font-size: 0.45rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 3px 8px;
            border: 1px solid rgba(0,0,0,0.2);
        }

        /* === DIVIDER / RESIZE HANDLE === */
        .divider {
            width: 1px;
            height: 100vh;
            background: #000;
            position: relative;
            cursor: col-resize;
            flex-shrink: 0;
            z-index: 100;
            user-select: none;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 0;
            left: -8px;
            width: 17px;
            height: 100%;
            cursor: col-resize;
        }

        .divider-handle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.55rem;
            letter-spacing: 0.05em;
            color: #000;
            opacity: 0.25;
            pointer-events: none;
            transition: opacity 0.2s ease;
            white-space: nowrap;
            background: #f5fccc;
            padding: 6px 2px;
        }

        .divider:hover .divider-handle {
            opacity: 0.6;
        }

        .divider.dragging .divider-handle {
            opacity: 0.8;
        }

        /* === RIGHT PANEL — GALLERY === */
        .right-panel {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            background: #f5fccc;
            scrollbar-width: none;
        }

        .right-panel::-webkit-scrollbar {
            display: none;
        }

        /* === SCATTER GALLERY (Views 1 & 2) === */
        .gallery-scatter {
            position: relative;
            width: 100%;
            min-height: 100vh;
            padding: 30px;
        }

        .scatter-item {
            position: absolute;
            cursor: pointer;
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            opacity: 0;
            transform: translateY(10px);
        }

        .scatter-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .scatter-item:hover {
            z-index: 50;
        }

        .scatter-item:hover .scatter-img {
            filter: contrast(1.08);
        }

        .scatter-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: filter 0.3s ease, transform 0.35s ease;
        }

        .scatter-item:hover .scatter-img {
            transform: scale(1.02);
        }

        /* Hover tooltip on scatter images */
        .scatter-tooltip {
            position: absolute;
            bottom: -8px;
            left: 0;
            transform: translateY(100%);
            background: #000;
            color: #f5fccc;
            padding: 8px 12px;
            font-size: 0.5rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 60;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .scatter-item:hover .scatter-tooltip {
            opacity: 1;
            pointer-events: auto;
        }

        .scatter-tooltip-arrow {
            font-size: 0.6rem;
            transition: transform 0.2s ease;
        }

        .scatter-tooltip:hover .scatter-tooltip-arrow {
            transform: translateX(3px);
        }

        /* === PRESENTATION MODE (View 3) === */
        .gallery-presentation {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .presentation-img-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .presentation-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.4s ease;
        }

        .presentation-counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.5rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.35;
        }

        .presentation-label {
            position: absolute;
            bottom: 38px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.5;
        }

        .presentation-hint {
            position: absolute;
            top: 20px;
            right: 24px;
            font-size: 0.45rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0.2;
        }

        /* === TRANSITIONS === */
        .view-enter {
            animation: viewFadeIn 0.4s ease forwards;
        }

        @keyframes viewFadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stagger-1 { animation-delay: 0.05s; }
        .stagger-2 { animation-delay: 0.1s; }
        .stagger-3 { animation-delay: 0.15s; }
        .stagger-4 { animation-delay: 0.2s; }
        .stagger-5 { animation-delay: 0.25s; }
        .stagger-6 { animation-delay: 0.3s; }

        /* === NO-SELECT DURING DRAG === */
        body.resizing {
            cursor: col-resize;
            user-select: none;
        }

        body.resizing .left-panel,
        body.resizing .right-panel {
            pointer-events: none;
        }
    </style>
</head>

    // ============================================
    // STATE
    // ============================================
    let currentView = 1;
    let selectedCategory = null;
    let selectedProject = null;
    let presentationIndex = 0;

    // ============================================
    // HELPERS
    // ============================================
    function getAllProjects() {
        const all = [];
        data.categories.forEach(cat => {
            cat.years.forEach(yg => {
                yg.projects.forEach(p => {
                    all.push({ ...p, categoryName: cat.name, categoryColor: cat.color });
                });
            });
        });
        return all;
    }

    function getCategoryProjects(catName) {
        const cat = data.categories.find(c => c.name === catName);
        if (!cat) return [];
        const all = [];
        cat.years.forEach(yg => {
            yg.projects.forEach(p => {
                all.push({ ...p, categoryName: cat.name, categoryColor: cat.color });
            });
        });
        return all;
    }

    // ============================================
    // SCATTER LAYOUT ENGINE
    // ============================================
    function generateScatter(count) {
        const positions = [];
        const sizePresets = [
            { wPct: 40, h: 280 },
            { wPct: 28, h: 210 },
            { wPct: 34, h: 250 },
            { wPct: 22, h: 190 },
            { wPct: 45, h: 300 },
            { wPct: 26, h: 230 },
            { wPct: 38, h: 260 },
            { wPct: 30, h: 200 },
        ];

        let currentTop = 20;

        for (let i = 0; i < count; i++) {
            const preset = sizePresets[i % sizePresets.length];
            const leftBias = (i % 2 === 0) ? 3 + Math.random() * 15 : 50 + Math.random() * 15;
            const left = Math.max(2, Math.min(96 - preset.wPct, leftBias + (Math.random() - 0.5) * 10));
            const gap = 30 + Math.random() * 50;

            positions.push({
                left: left,
                top: currentTop,
                width: preset.wPct,
                height: preset.h + (Math.random() - 0.5) * 40,
            });

            currentTop += preset.h * 0.7 + gap;
        }

        return positions;
    }

    // ============================================
    // RENDER VIEW 1 — Categories
    // ============================================
    function renderView1() {
        currentView = 1;
        selectedCategory = null;
        selectedProject = null;

        const left = document.getElementById('leftContent');
        left.innerHTML = '';

        const wrap = document.createElement('div');
        wrap.classList.add('categories-view');

        data.categories.forEach((cat, i) => {
            const item = document.createElement('div');
            item.classList.add('category-item', 'view-enter', `stagger-${i + 1}`);
            item.textContent = cat.name;
            item.addEventListener('mouseenter', () => {
                item.style.color = cat.color;
            });
            item.addEventListener('mouseleave', () => {
                if (!item.classList.contains('active')) {
                    item.style.color = '';
                }
            });
            item.addEventListener('click', () => {
                renderView2(cat.name);
            });
            wrap.appendChild(item);
        });

        left.appendChild(wrap);
        renderScatterGallery(getAllProjects());
    }

    // ============================================
    // RENDER VIEW 2 — Year/Project list
    // ============================================
    function renderView2(categoryName) {
        currentView = 2;
        selectedCategory = categoryName;
        selectedProject = null;

        const cat = data.categories.find(c => c.name === categoryName);
        const left = document.getElementById('leftContent');
        left.innerHTML = '';

        const wrap = document.createElement('div');
        wrap.classList.add('projects-list-view', 'view-enter');

        data.categories.forEach((c, i) => {
            if (c.name === categoryName) {
                const header = document.createElement('div');
                header.classList.add('category-header', 'view-enter', `stagger-${i + 1}`);
                header.textContent = c.name;
                header.addEventListener('click', () => renderView1());
                wrap.appendChild(header);

                c.years.forEach((yg, yi) => {
                    const yearGroup = document.createElement('div');
                    yearGroup.classList.add('year-group', 'view-enter', `stagger-${yi + 3}`);

                    const yearLabel = document.createElement('div');
                    yearLabel.classList.add('year-label');
                    yearLabel.textContent = yg.year;
                    yearGroup.appendChild(yearLabel);

                    yg.projects.forEach(p => {
                        const pItem = document.createElement('div');
                        pItem.classList.add('project-list-item');
                        pItem.textContent = p.title;
                        pItem.addEventListener('mouseenter', () => {
                            pItem.style.color = c.color;
                        });
                        pItem.addEventListener('mouseleave', () => {
                            pItem.style.color = '';
                        });
                        pItem.addEventListener('click', () => {
                            renderView3(p, c);
                        });
                        yearGroup.appendChild(pItem);
                    });

                    wrap.appendChild(yearGroup);
                });
            } else {
                const header = document.createElement('div');
                header.classList.add('category-item', 'dimmed', 'view-enter', `stagger-${i + 1}`);
                header.textContent = c.name;
                header.addEventListener('click', () => renderView2(c.name));
                wrap.appendChild(header);
            }
        });

        left.appendChild(wrap);
        renderScatterGallery(getCategoryProjects(categoryName));
    }

        const left = document.getElementById('leftContent');

        const wrap = document.createElement('div');
        wrap.classList.add('project-detail-view', 'view-enter');

        // Breadcrumb
        const breadcrumb = document.createElement('div');
        breadcrumb.classList.add('breadcrumb', 'view-enter', 'stagger-1');

        const bcAll = document.createElement('span');
        bcAll.classList.add('breadcrumb-link');
        bcAll.textContent = 'All';
        bcAll.addEventListener('click', () => renderView1());
        breadcrumb.appendChild(bcAll);
        breadcrumb.appendChild(document.createTextNode(' / '));

        const bcCat = document.createElement('span');
        bcCat.classList.add('breadcrumb-link');
        bcCat.textContent = category.name;
        bcCat.addEventListener('click', () => renderView2(category.name));
        breadcrumb.appendChild(bcCat);
        breadcrumb.appendChild(document.createTextNode(' / '));

        const bcYear = document.createElement('span');
        bcYear.textContent = project.year;
        breadcrumb.appendChild(bcYear);
        wrap.appendChild(breadcrumb);

        // Title
        const title = document.createElement('div');
        title.classList.add('detail-title', 'view-enter', 'stagger-2');
        title.textContent = project.title;
        wrap.appendChild(title);

        // Meta
        const meta = document.createElement('div');
        meta.classList.add('detail-meta', 'view-enter', 'stagger-3');

        [
            { label: 'Year', value: project.year },
            { label: 'Location', value: project.location },
            { label: 'With', value: project.participants },
            { label: 'Type', value: project.type },
        ].forEach(f => {
            const row = document.createElement('div');
            row.classList.add('meta-row');
            row.innerHTML = `<span class="meta-label">${f.label}</span><span class="meta-value">${f.value}</span>`;
            meta.appendChild(row);
        });
        wrap.appendChild(meta);

        // Description
        const text = document.createElement('div');
        text.classList.add('detail-text', 'view-enter', 'stagger-4');
        text.textContent = project.description;
        wrap.appendChild(text);

        // Tags
        const tags = document.createElement('div');
        tags.classList.add('detail-tags', 'view-enter', 'stagger-5');
        project.tags.forEach(t => {
            const tag = document.createElement('span');
            tag.classList.add('tag');
            tag.textContent = t;
            tags.appendChild(tag);
        });
        wrap.appendChild(tags);

        left.appendChild(wrap);
        renderPresentationGallery(project);
    }

    // ============================================
    // SCATTER GALLERY (Views 1 & 2)
    // ============================================
    function renderScatterGallery(projects) {
        const panel = document.getElementById('rightPanel');
        panel.innerHTML = '';
        panel.scrollTop = 0;

        const canvas = document.createElement('div');
        canvas.classList.add('gallery-scatter');

        const items = projects.map(p => ({
            src: p.keyImage,
            label: p.title,
            project: p,
            category: data.categories.find(c => c.name === p.categoryName),
        }));

        const positions = generateScatter(items.length);

        let maxBottom = 0;
        items.forEach((item, index) => {
            const pos = positions[index];
            const bottom = pos.top + pos.height + 40;
            if (bottom > maxBottom) maxBottom = bottom;

            const el = document.createElement('div');
            el.classList.add('scatter-item');
            el.style.left = pos.left + '%';
            el.style.top = pos.top + 'px';
            el.style.width = pos.width + '%';
            el.style.height = pos.height + 'px';

            const img = document.createElement('img');
            img.classList.add('scatter-img');
            img.src = item.src;
            img.alt = item.label;
            img.loading = 'lazy';
            el.appendChild(img);

            const tooltip = document.createElement('div');
            tooltip.classList.add('scatter-tooltip');
            tooltip.innerHTML = `${item.label} <span class="scatter-tooltip-arrow">&rarr;</span>`;
            el.appendChild(tooltip);

            el.addEventListener('click', () => {
                renderView3(item.project, item.category);
            });

            canvas.appendChild(el);

            setTimeout(() => {
                el.classList.add('visible');
            }, 150 + (index * 100));
        });

        canvas.style.minHeight = maxBottom + 60 + 'px';
        panel.appendChild(canvas);
    }

    // ============================================
    // PRESENTATION GALLERY (View 3)
    // ============================================
    function renderPresentationGallery(project) {
        const panel = document.getElementById('rightPanel');
        panel.innerHTML = '';
        panel.scrollTop = 0;

        const wrap = document.createElement('div');
        wrap.classList.add('gallery-presentation');

        const imgWrap = document.createElement('div');
        imgWrap.classList.add('presentation-img-wrapper');

        const img = document.createElement('img');
        img.classList.add('presentation-img');
        img.src = project.images[0].src;
        img.alt = project.images[0].label;
        imgWrap.appendChild(img);
        wrap.appendChild(imgWrap);

        const label = document.createElement('div');
        label.classList.add('presentation-label');
        label.textContent = project.images[0].label;
        wrap.appendChild(label);

        const counter = document.createElement('div');
        counter.classList.add('presentation-counter');
        counter.textContent = `1 / ${project.images.length}`;
        wrap.appendChild(counter);

        if (project.images.length > 1) {
            const hint = document.createElement('div');
            hint.classList.add('presentation-hint');
            hint.textContent = 'Scroll to navigate';
            wrap.appendChild(hint);
        }

        function updateImage() {
            img.style.opacity = 0;
            setTimeout(() => {
                img.src = project.images[presentationIndex].src;
                img.alt = project.images[presentationIndex].label;
                label.textContent = project.images[presentationIndex].label;
                counter.textContent = `${presentationIndex + 1} / ${project.images.length}`;
                img.style.opacity = 1;
            }, 200);
        }

        // Scroll to switch images
        let scrollCooldown = false;
        wrap.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (scrollCooldown) return;
            scrollCooldown = true;

            if (e.deltaY > 0) {
                presentationIndex = Math.min(presentationIndex + 1, project.images.length - 1);
            } else {
                presentationIndex = Math.max(presentationIndex - 1, 0);
            }

            updateImage();
            setTimeout(() => { scrollCooldown = false; }, 500);
        }, { passive: false });

        // Arrow keys
        const keyHandler = (e) => {
            if (currentView !== 3) {
                document.removeEventListener('keydown', keyHandler);
                return;
            }
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                presentationIndex = Math.min(presentationIndex + 1, project.images.length - 1);
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                presentationIndex = Math.max(presentationIndex - 1, 0);
            } else {
                return;
            }
            updateImage();
        };
        document.addEventListener('keydown', keyHandler);

        panel.appendChild(wrap);
    }

    // ============================================
    // RESIZABLE DIVIDER
    // ============================================
    (function initResizer() {
        const divider = document.getElementById('divider');
        const leftPanel = document.getElementById('leftPanel');
        const page = document.querySelector('.page');
        let isDragging = false;

        divider.addEventListener('mousedown', (e) => {
            isDragging = true;
            document.body.classList.add('resizing');
            divider.classList.add('dragging');
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const pageWidth = page.getBoundingClientRect().width;
            const newWidth = (e.clientX / pageWidth) * 100;
            const clamped = Math.max(15, Math.min(70, newWidth));
            leftPanel.style.width = clamped + '%';
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                document.body.classList.remove('resizing');
                divider.classList.remove('dragging');
            }
        });
    })();

    // ============================================
    // INIT
    // ============================================
    renderView1();

    </script>
