<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dellus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Trispace:wdth,wght@75..125,300..800&family=Recursive:slnt,wght,CASL,CRSV,MONO@-15..0,300..1000,0..1,0..1,0..1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:            #ffffff;
            --fg:            #000;
            --border-strong: #000;
            --border-soft:   rgba(0, 0, 0, 0.15);
            --font-family:   'JunicodeVF', serif;
            --font-var:      normal;
            --font-scale:    1.5;
        }

        @font-face {
            font-family: 'JunicodeVF';
            src: url('assets/fonts/Junicode/JunicodeVF-Roman.woff2') format('woff2');
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'JunicodeVF';
            src: url('assets/fonts/Junicode/JunicodeVF-Italic.woff2') format('woff2');
            font-weight: 100 900;
            font-style: italic;
            font-display: swap;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html { font-size: calc(var(--font-scale) * 16px); }

        html, body {
            height: 100%; width: 100%; overflow: hidden;
            background: var(--bg); color: var(--fg);
            font-family: var(--font-family);
            font-variation-settings: var(--font-var);
            -webkit-font-smoothing: antialiased;
        }

        /* ── MENU WINDOW ─────────────────────────────────────── */
        .menu-body { padding: 20px 20px 16px 20px; overflow-y: auto; }

        .menu-landing-title {
            font-size: 1.45rem; letter-spacing: 0.22em;
            text-transform: uppercase; font-weight: bold;
            user-select: none; line-height: 1;
            margin-bottom: 4px;
        }
        .menu-landing-sub {
            font-size: 0.45rem; letter-spacing: 0.16em;
            text-transform: uppercase; opacity: 0.35;
            user-select: none; margin-bottom: 16px;
        }

        .menu-title {
            font-size: 0.95rem; letter-spacing: 0.18em;
            text-transform: uppercase; font-weight: bold;
            margin-bottom: 18px; user-select: none;
        }

        .menu-nav {
            display: flex; align-items: center; gap: 5px;
            margin-bottom: 14px; flex-wrap: wrap;
        }

        .nav-link {
            font-size: 0.6rem; letter-spacing: 0.1em;
            text-transform: uppercase; cursor: pointer;
            opacity: 0.45; transition: opacity 0.15s, font-weight 0.15s;
            user-select: none;
        }
        .nav-link:hover { opacity: 1; font-weight: bold; }

        .nav-sep { font-size: 0.55rem; opacity: 0.25; user-select: none; }

        .menu-rule {
            border: none; border-top: 1px solid rgba(0,0,0,0.1);
            margin: 12px 0;
        }

        .cat-label {
            font-size: 0.5rem; letter-spacing: 0.14em;
            text-transform: uppercase; opacity: 0.3;
            margin: 10px 0 5px 0; user-select: none;
        }

        .proj-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 3px 0; cursor: pointer; gap: 6px;
        }

        .proj-name {
            font-size: 0.65rem; letter-spacing: 0.05em;
            text-transform: uppercase; opacity: 0.6;
            transition: opacity 0.15s, font-weight 0.15s;
            user-select: none; line-height: 1.4;
        }
        .proj-row:hover .proj-name { opacity: 1; font-weight: bold; }
        .proj-row.open .proj-name  { opacity: 0.3; }

        .proj-badge {
            font-size: 0.38rem; letter-spacing: 0.08em;
            opacity: 0.3; border: 1px solid rgba(0,0,0,0.2);
            padding: 1px 4px; user-select: none; white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── WORKSPACE ──────────────────────────────────────── */
        .workspace {
            position: fixed; top: 0;
            left: 0; right: 0; bottom: 0;
            overflow: auto;
        }

        body.dragging  { cursor: move !important; user-select: none; }
        .win-frame.win-draggable { cursor: grab; }
        .win-frame.win-draggable:active { cursor: grabbing; }
        body.resizing  { user-select: none; }

        /* ── Slideshow ── */
        .slide-float {
            position: absolute; overflow: hidden;
            background: var(--bg); border: 1px solid var(--border-strong);
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
            user-select: none; transition: box-shadow 0.15s;
        }
        .slide-float img {
            position: absolute; inset: 0 0 28px 0;
            width: 100%; height: calc(100% - 28px);
            object-fit: contain; display: block; pointer-events: none;
        }
        .slide-nav {
            position: absolute; top: 0; bottom: 28px; width: 50%;
            display: flex; align-items: center;
            cursor: pointer; opacity: 0; transition: opacity 0.15s;
        }
        .slide-float:hover .slide-nav { opacity: 1; }
        .slide-nav-prev { left: 0; justify-content: flex-start; padding-left: 10px; }
        .slide-nav-next { right: 0; justify-content: flex-end;  padding-right: 10px; }
        .slide-chevron {
            font-size: 1.1rem; color: var(--fg); opacity: 0.4;
            transition: opacity 0.1s; text-shadow: 0 0 6px var(--bg);
        }
        .slide-nav:hover .slide-chevron { opacity: 1; }
        .slide-bar {
            position: absolute; bottom: 0; left: 0; right: 0; height: 28px;
            display: flex; align-items: center; padding: 0 8px; gap: 8px;
            border-top: 1px solid var(--border-strong);
            font-size: 0.55rem; opacity: 0; transition: opacity 0.2s;
        }
        .slide-float:hover .slide-bar { opacity: 1; }
        .slide-title  { flex: 1; opacity: 0.5; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .slide-counter { opacity: 0.35; flex-shrink: 0; }
        .slide-close  { opacity: 0.3; cursor: pointer; flex-shrink: 0; transition: opacity 0.15s; }
        .slide-close:hover { opacity: 0.9; }
        .slide-resize {
            position: absolute; bottom: 0; right: 0;
            width: 14px; height: 14px; cursor: nwse-resize;
        }

        /* ג"€ג"€ WINDOW FRAME ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ */
        .win-frame {
            position: absolute;
            border: 1px solid var(--border-strong);
            background: var(--bg);
            display: flex; flex-direction: column;
            min-width: 260px; min-height: 180px;
        }
        .win-frame.focused { z-index: 500; }

        @keyframes winSpawn {
            from { opacity: 0; transform: scale(0.93); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes winClose {
            from { opacity: 1; transform: scale(1); }
            to   { opacity: 0; transform: scale(0.93); }
        }
        .win-frame.spawning { animation: winSpawn 0.3s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
        .win-frame.closing  { animation: winClose 0.22s ease forwards; pointer-events: none; }

        .win-titlebar {
            height: 24px; min-height: 24px;
            border-bottom: 1px solid transparent;
            display: flex; align-items: center;
            padding: 0 8px; cursor: move;
            user-select: none; gap: 8px; flex-shrink: 0;
            transition: border-color 0.2s;
        }
        .win-frame:hover .win-titlebar { border-bottom-color: var(--border-strong); }

        .win-title {
            font-size: 0.5rem; letter-spacing: 0.12em;
            text-transform: uppercase; opacity: 0; flex: 1;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            transition: opacity 0.2s;
        }
        .win-frame:hover .win-title { opacity: 0.5; }
        .win-type-tag { transition: opacity 0.2s; }
        .win-frame:hover .win-type-tag { opacity: 0.25; }

        .win-type-tag {
            font-size: 0.38rem; letter-spacing: 0.08em;
            text-transform: uppercase; opacity: 0;
            white-space: nowrap;
        }

        .win-close {
            font-size: 0.55rem; opacity: 0; cursor: pointer;
            transition: opacity 0.15s; padding: 0 2px;
            user-select: none; flex-shrink: 0;
        }
        .win-frame:hover .win-close { opacity: 0.3; }
        .win-close:hover { opacity: 0.9 !important; }
        .win-collapse {
            font-size: 0.55rem; opacity: 0; cursor: pointer;
            transition: opacity 0.15s; padding: 0 2px;
            user-select: none; flex-shrink: 0;
        }
        .win-frame:hover .win-collapse { opacity: 0.3; }
        .win-collapse:hover { opacity: 0.9 !important; }

        .win-body {
            flex: 1; overflow: auto; position: relative;
        }

        .win-resize-edge { position: absolute; z-index: 10; }
        .win-resize-edge[data-dir="n"]  { top: -3px; left: 10px; right: 10px; height: 7px; cursor: ns-resize; }
        .win-resize-edge[data-dir="s"]  { bottom: -3px; left: 10px; right: 10px; height: 7px; cursor: ns-resize; }
        .win-resize-edge[data-dir="e"]  { right: -3px; top: 10px; bottom: 10px; width: 7px; cursor: ew-resize; }
        .win-resize-edge[data-dir="w"]  { left: -3px; top: 10px; bottom: 10px; width: 7px; cursor: ew-resize; }
        .win-resize-edge[data-dir="nw"] { top: -3px; left: -3px; width: 12px; height: 12px; cursor: nwse-resize; }
        .win-resize-edge[data-dir="ne"] { top: -3px; right: -3px; width: 12px; height: 12px; cursor: nesw-resize; }
        .win-resize-edge[data-dir="sw"] { bottom: -3px; left: -3px; width: 12px; height: 12px; cursor: nesw-resize; }
        .win-resize-edge[data-dir="se"] { bottom: -3px; right: -3px; width: 12px; height: 12px; cursor: nwse-resize; }

        /* ג"€ג"€ INFO WINDOW ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ */
        .info-body {
            padding: 16px 18px;
            display: flex; flex-direction: column; gap: 10px;
            overflow-y: auto;
        }

        .info-meta {
            display: flex; align-items: center; gap: 5px;
            font-size: 0.48rem; letter-spacing: 0.08em;
            text-transform: uppercase; opacity: 0.4;
            flex-wrap: wrap;
        }
        .info-meta-sep { opacity: 0.4; }

        .info-participants {
            font-size: 0.48rem; letter-spacing: 0.06em;
            text-transform: uppercase; opacity: 0.35;
        }

        .info-desc {
            font-size: 0.62rem; letter-spacing: 0.03em;
            line-height: 1.7; opacity: 0.75; flex: 1;
        }

        .info-tags {
            display: flex; flex-wrap: wrap; gap: 5px;
        }

        .tag {
            font-size: 0.38rem; letter-spacing: 0.1em;
            text-transform: uppercase; opacity: 0.3;
            border: 1px solid rgba(0,0,0,0.2); padding: 2px 6px;
        }

        .info-actions {
            display: flex; gap: 8px; margin-top: 4px;
            border-top: 1px solid rgba(0,0,0,0.08);
            padding-top: 10px;
        }

        .action-btn {
            font-family: var(--font-family);
            font-size: 0.5rem; letter-spacing: 0.1em;
            text-transform: uppercase; background: none;
            border: 1px solid rgba(0,0,0,0.25); cursor: pointer;
            padding: 4px 10px; color: var(--fg); opacity: 0.5;
            transition: opacity 0.15s, background 0.15s, color 0.15s;
        }
        .action-btn:hover { opacity: 1; background: var(--fg); color: var(--bg); }

        /* ג"€ג"€ GALLERY WINDOW ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ */
        .gallery-body { padding: 0; overflow: hidden; display: flex; flex-direction: column; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1px; padding: 1px; overflow-y: auto; flex: 1;
        }

        .gallery-thumb {
            position: relative; aspect-ratio: 4/3;
            overflow: hidden; cursor: pointer; background: rgba(0,0,0,0.04);
        }
        .gallery-thumb img {
            width: 100%; height: 100%; object-fit: cover;
            transition: opacity 0.2s; display: block;
        }
        .gallery-thumb:hover img { opacity: 0.75; }

        .thumb-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            font-size: 0.38rem; letter-spacing: 0.08em;
            text-transform: uppercase; padding: 4px 6px;
            background: rgba(245,252,204,0.85);
            opacity: 0; transition: opacity 0.2s;
        }
        .gallery-thumb:hover .thumb-label { opacity: 1; }

        .gallery-present {
            display: flex; flex-direction: column; flex: 1; height: 100%;
        }
        .gallery-present img {
            flex: 1; width: 100%; object-fit: contain;
            display: block; background: var(--bg); min-height: 0;
        }
        .present-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 10px; border-top: 1px solid var(--border-strong);
            flex-shrink: 0;
        }
        .present-nav, .present-back {
            font-family: var(--font-family);
            font-size: 0.5rem; letter-spacing: 0.1em;
            background: none; border: none; cursor: pointer;
            opacity: 0.4; transition: opacity 0.15s; color: var(--fg);
            padding: 2px 4px;
        }
        .present-nav:hover, .present-back:hover { opacity: 1; }
        .present-label {
            flex: 1; font-size: 0.45rem; letter-spacing: 0.08em;
            text-transform: uppercase; opacity: 0.4; text-align: center;
        }

        /* -- THEME WINDOW -- */
        .theme-body {
            padding: 18px 20px; display: flex; flex-direction: column; gap: 18px;
        }
        .theme-row { display: flex; flex-direction: column; gap: 8px; }
        .theme-row-header {
            display: flex; align-items: center; justify-content: space-between;
        }
        .theme-row-label {
            font-size: 0.45rem; letter-spacing: 0.14em;
            text-transform: uppercase; opacity: 0.4; user-select: none;
        }
        .theme-row-sublabel {
            font-size: 0.38rem; letter-spacing: 0.12em;
            text-transform: uppercase; opacity: 0.25;
            margin-top: 2px; user-select: none;
        }
        .theme-font-line { display: flex; align-items: center; gap: 10px; }
        .theme-font-label {
            font-size: 0.55rem; opacity: 0.5;
            user-select: none; line-height: 1;
        }
        .theme-font-label.lg { font-size: 0.85rem; }
        .theme-slider {
            -webkit-appearance: none; appearance: none;
            flex: 1; height: 1px; background: var(--fg);
            opacity: 0.3; outline: none; cursor: pointer;
        }
        .theme-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 9px; height: 9px; border-radius: 50%;
            background: var(--fg); cursor: pointer;
            transition: transform 0.15s;
        }
        .theme-slider::-webkit-slider-thumb:hover { transform: scale(1.35); }
        .theme-slider::-moz-range-thumb {
            width: 9px; height: 9px; border-radius: 50%;
            background: var(--fg); cursor: pointer; border: none;
        }
        .theme-swatches {
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        }
        .theme-swatch {
            width: 16px; height: 16px; border-radius: 50%;
            border: 1px solid var(--border-strong);
            cursor: pointer; padding: 0; flex-shrink: 0;
            transition: transform 0.15s, box-shadow 0.15s;
            position: relative; font-family: var(--font-family);
            font-size: 0.55rem; color: var(--fg);
            display: flex; align-items: center; justify-content: center;
        }
        .theme-swatch:hover { transform: scale(1.2); }
        .theme-swatch.active {
            box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--fg);
            transform: scale(1.1);
        }
        .theme-swatch-custom {
            background: transparent; border-style: dashed; opacity: 0.5;
        }
        .theme-swatch-custom:hover { opacity: 1; }
        .theme-color-input {
            position: absolute; width: 0; height: 0;
            opacity: 0; pointer-events: none;
        }
        .theme-font-btns {
            display: flex; gap: 6px; flex-wrap: wrap;
        }
        .theme-font-btn {
            font-size: 0.42rem; letter-spacing: 0.08em;
            text-transform: uppercase; background: none;
            border: 1px solid rgba(0,0,0,0.2); cursor: pointer;
            padding: 3px 8px; color: var(--fg); opacity: 0.4;
            transition: opacity 0.15s, border-color 0.15s, font-weight 0.15s;
        }
        .theme-font-btn:hover { opacity: 0.7; }
        .theme-font-btn.active { opacity: 1; border-color: var(--fg); font-weight: bold; }
        .theme-fg-line {
            display: flex; align-items: center; gap: 10px;
        }
        .theme-fg-swatches {
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        }

        /* ג"€ג"€ TEXT WINDOW ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ */
        .text-body { padding: 20px 22px; overflow-y: auto; }

        .text-content {
            font-family: var(--font-family);
            font-size: 0.65rem; letter-spacing: 0.04em;
            line-height: 1.8; opacity: 0.75;
            white-space: pre-wrap; word-break: break-word;
        }

        /* ג"€ג"€ 3D VIEWER INTERNALS ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ */
        .viewer-wrap { position: relative; width: 100%; height: 100%; overflow: hidden; }

        .cv-canvas, .cv-ascii {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        .cv-canvas canvas { width: 100% !important; height: 100% !important; display: block; }
        .cv-ascii { display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .focus-btn {
            position: absolute; top: 10px; left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-family);
            font-size: 0.55rem; letter-spacing: 0.1em;
            background: none; border: none; cursor: pointer; color: var(--fg);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s; z-index: 15;
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            white-space: nowrap; user-select: none;
        }
        .focus-label { font-size: 0.38rem; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.7; }
        .focus-btn.visible { opacity: 0.45; pointer-events: auto; }
        .focus-btn.visible:hover { opacity: 0.9; }

        .win-settings {
            position: absolute; bottom: 28px; left: 0; right: 0;
            background: var(--bg); border-top: 1px solid var(--border-strong); z-index: 20;
            overflow: hidden; max-height: 0; opacity: 0;
            pointer-events: none;
            transition: max-height 0.3s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.25s;
        }
        .win-settings.open { max-height: 200px; opacity: 1; pointer-events: auto; }

        .settings-inner { padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }

        .setting-row { display: flex; align-items: center; gap: 10px; }

        .setting-label {
            font-size: 0.42rem; letter-spacing: 0.12em;
            text-transform: uppercase; opacity: 0.35;
            white-space: nowrap; width: 46px; flex-shrink: 0;
        }

        .ctrl-slider {
            -webkit-appearance: none; appearance: none;
            width: 90px; height: 1px; background: var(--fg);
            opacity: 0.3; outline: none; cursor: pointer;
        }
        .ctrl-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 8px; height: 8px;
            background: var(--fg); border-radius: 50%; cursor: pointer;
        }
        .ctrl-slider::-moz-range-thumb {
            width: 8px; height: 8px; background: var(--fg);
            border-radius: 50%; cursor: pointer; border: none;
        }

        .ctrl-toggle {
            font-family: var(--font-family);
            font-size: 0.42rem; letter-spacing: 0.1em; text-transform: uppercase;
            background: none; border: 1px solid rgba(0,0,0,0.2); cursor: pointer;
            padding: 2px 7px; color: var(--fg); opacity: 0.4;
            transition: opacity 0.2s, background 0.2s, color 0.2s;
        }
        .ctrl-toggle:hover { opacity: 0.65; }
        .ctrl-toggle.on { opacity: 1; background: var(--fg); color: var(--bg); }

        .charset-group { display: flex; gap: 5px; flex-wrap: wrap; }

        .charset-option {
            font-family: var(--font-family);
            font-size: 0.42rem; letter-spacing: 0.08em; text-transform: uppercase;
            background: none; border: 1px solid rgba(0,0,0,0.12); cursor: pointer;
            padding: 2px 6px; color: var(--fg); opacity: 0.3;
            transition: opacity 0.2s, border-color 0.2s;
        }
        .charset-option:hover { opacity: 0.55; }
        .charset-option.active { opacity: 1; border-color: var(--fg); font-weight: bold; }

        .win-bottom-hover {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 12px; z-index: 20;
        }

        .win-bottom-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 28px; border-top: 1px solid var(--border-strong);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px; background: var(--bg); z-index: 21;
            opacity: 0; transform: translateY(4px); pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
        }
        .win-bottom-bar.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .wbb-left { display: flex; align-items: center; gap: 2px; }

        .mode-btn {
            font-family: var(--font-family);
            font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
            background: none; border: none; cursor: pointer;
            padding: 3px 4px; color: var(--fg); opacity: 0.3;
            transition: opacity 0.2s, font-weight 0.15s; white-space: nowrap;
        }
        .mode-btn:hover { opacity: 0.55; }

<body>

    <div class="workspace" id="workspace"></div>
    <div id="err-banner" style="display:none;position:fixed;top:0;left:0;right:0;padding:10px 16px;background:#c00;color:#fff;font:12px monospace;z-index:9999;white-space:pre-wrap;"></div>

    <script src="js/config.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { LineSegments2 } from 'three/addons/lines/LineSegments2.js';
        import { LineSegmentsGeometry } from 'three/addons/lines/LineSegmentsGeometry.js';
        import { LineMaterial } from 'three/addons/lines/LineMaterial.js';

        // ================================================================
        // WINDOW SYSTEM
        // ================================================================
        let topZ = 50;
        const openWins = {};

        function nextSpawn(w = 300, h = 250) {
            const sw = window.innerWidth, sh = window.innerHeight;
            const pad = 28, step = 32, margin = 10;
            const frames = [...document.querySelectorAll('.win-frame')].map(f => ({
                x: f.offsetLeft, y: f.offsetTop, w: f.offsetWidth, h: f.offsetHeight
            }));
            function free(x, y) {
                if (x + w > sw - pad || y + h > sh - pad) return false;
                for (const f of frames) {
                    if (x < f.x + f.w + margin && x + w + margin > f.x &&
                        y < f.y + f.h + margin && y + h + margin > f.y) return false;
                }
                return true;
            }
            for (let row = pad; row + h < sh - pad; row += step)
                for (let col = pad; col + w < sw - pad; col += step)
                    if (free(col, row)) return { x: col, y: row };
            return { x: Math.max(pad, Math.min(sw - w - pad, (sw - w) / 2)), y: Math.max(pad, Math.min(sh - h - pad, (sh - h) / 2)) };
        }
        function focusOrCreate(key, createFn) {
            if (openWins[key]) { openWins[key].style.zIndex = ++topZ; return; }
            createFn();
        }

        function makeFrame({ title, tag = '', w, h, key, minW = 260, minH = 180, bodyDrag = false, collapsible = false }) {
            const { x, y } = nextSpawn(w, h);
            const ws = document.getElementById('workspace');

            const frame = document.createElement('div');
            frame.className = 'win-frame spawning';
            frame.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;z-index:${++topZ}`;

            frame.innerHTML = `
                <div class="win-titlebar">
                    <span class="win-title">${title}</span>
                    ${tag ? `<span class="win-type-tag">${tag}</span>` : ''}
                    ${collapsible ? '<span class="win-collapse">&#x2212;</span>' : ''}
                    <span class="win-close">&#x2014;</span>
                </div>
                <div class="win-body"></div>
                <div class="win-resize-edge" data-dir="n"></div>
                <div class="win-resize-edge" data-dir="s"></div>
                <div class="win-resize-edge" data-dir="e"></div>
                <div class="win-resize-edge" data-dir="w"></div>
                <div class="win-resize-edge" data-dir="nw"></div>
                <div class="win-resize-edge" data-dir="ne"></div>
                <div class="win-resize-edge" data-dir="sw"></div>
                <div class="win-resize-edge" data-dir="se"></div>
            `;

            ws.appendChild(frame);
            if (key) openWins[key] = frame;

            frame.addEventListener('mousedown', () => frame.style.zIndex = ++topZ);

            // Close
            frame.querySelector('.win-close').addEventListener('click', e => {
                e.stopPropagation();
                frame.classList.add('closing');
                setTimeout(() => { frame.remove(); if (key) delete openWins[key]; }, 220);
            });

            // Collapse
            let _collapsed = false;
            if (collapsible) {
                const colBtn = frame.querySelector('.win-collapse');
                const winBody = frame.querySelector('.win-body');
                const collapseFrame = () => { _collapsed = true;  winBody.style.display = 'none'; colBtn.textContent = '+'; frame.style.height = ''; frame.style.minHeight = '0'; };
                const expandFrame  = () => { _collapsed = false; winBody.style.display = '';     colBtn.textContent = String.fromCharCode(8722); frame.style.minHeight = ''; };
                colBtn.addEventListener('click', e => { e.stopPropagation(); _collapsed ? expandFrame() : collapseFrame(); });
                frame.querySelector('.win-titlebar').addEventListener('dblclick', () => _collapsed ? expandFrame() : collapseFrame());
                frame._collapse = collapseFrame;
                frame._expand   = expandFrame;
            }

            // Drag
            const tb = frame.querySelector('.win-titlebar');
            if (bodyDrag) frame.classList.add('win-draggable');
            let dragging = false, ox = 0, oy = 0;
            const dragTarget = bodyDrag ? frame : tb;
            dragTarget.addEventListener('mousedown', e => {
                if (e.target.closest('.win-resize-edge, .win-close, button, a, input, select')) return;
                dragging = true;
                ox = e.clientX + ws.scrollLeft - frame.offsetLeft;
                oy = e.clientY + ws.scrollTop - frame.offsetTop;
                if (bodyDrag) frame.style.cursor = 'grabbing';
                document.body.classList.add('dragging'); e.preventDefault();
            });
            document.addEventListener('mousemove', e => {
                if (!dragging) return;
                frame.style.left = Math.max(0, e.clientX + ws.scrollLeft - ox) + 'px';
                frame.style.top  = Math.max(0, e.clientY + ws.scrollTop - oy) + 'px';
            });
            document.addEventListener('mouseup', () => {
                if (dragging && bodyDrag) frame.style.cursor = '';
                dragging = false; document.body.classList.remove('dragging');
            });

            // Resize (8 directions)
            let resizing = false, resizeDir = '', rsx = 0, rsy = 0, rsw = 0, rsh = 0, rsl = 0, rst = 0;
            frame.querySelectorAll('.win-resize-edge').forEach(handle => {
                handle.addEventListener('mousedown', e => {
                    resizeDir = handle.dataset.dir;
                    resizing = true; rsx = e.clientX; rsy = e.clientY;
                    rsw = frame.offsetWidth; rsh = frame.offsetHeight;
                    rsl = frame.offsetLeft;  rst = frame.offsetTop;
                    const cursors = { n:'ns-resize', s:'ns-resize', e:'ew-resize', w:'ew-resize', nw:'nwse-resize', se:'nwse-resize', ne:'nesw-resize', sw:'nesw-resize' };
                    document.body.style.cursor = cursors[resizeDir] || 'default';
                    document.body.classList.add('resizing'); e.preventDefault(); e.stopPropagation();
                });
            });
            document.addEventListener('mousemove', e => {
                if (!resizing) return;
                const dx = e.clientX - rsx, dy = e.clientY - rsy;
                if (resizeDir.includes('e')) frame.style.width  = Math.max(minW, rsw + dx) + 'px';
                if (resizeDir.includes('s')) frame.style.height = Math.max(minH, rsh + dy) + 'px';
                if (resizeDir.includes('w')) {
                    const nw = Math.max(minW, rsw - dx);
                    frame.style.width = nw + 'px';
                    frame.style.left  = (rsl + rsw - nw) + 'px';
                }
                if (resizeDir.includes('n')) {
                    const nh = Math.max(minH, rsh - dy);
                    frame.style.height = nh + 'px';
                    frame.style.top    = (rst + rsh - nh) + 'px';
                }
                frame.dispatchEvent(new CustomEvent('win-resize'));
            });
            document.addEventListener('mouseup', () => {
                if (resizing) { resizing = false; document.body.style.cursor = ''; document.body.classList.remove('resizing'); }
            });

            setTimeout(() => frame.classList.remove('spawning'), 320);
            return frame;
        }

        // ג"€ג"€ INFO WINDOW ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€
        // ── SLIDESHOW WINDOW ──────────────────────────────────────────────────────
        function openSlideshow(project) {
            focusOrCreate(`slides-${project.id}`, () => {
                const ws = document.getElementById('workspace');
                const { x, y } = nextSpawn(640, 440);
                const slides = project.slides;
                let idx = 0;

                const el = document.createElement('div');
                el.className = 'slide-float spawning';
                el.style.cssText = `left:${x}px;top:${y}px;z-index:${++topZ};width:640px;height:440px;`;
                openWins[`slides-${project.id}`] = el;

                el.innerHTML = `
                    <img class="slide-img" draggable="false" src="${slides[0].src || slides[0]}" alt="">
                    <div class="slide-nav slide-nav-prev"><span class="slide-chevron">&lt;</span></div>
                    <div class="slide-nav slide-nav-next"><span class="slide-chevron">&gt;</span></div>
                    <div class="slide-bar">
                        <span class="slide-title">${project.title}</span>
                        <span class="slide-counter">1 / ${slides.length}</span>
                        <span class="slide-close">&#x2014;</span>
                    </div>
                    <div class="slide-resize"></div>
                `;

                ws.appendChild(el);
                setTimeout(() => el.classList.remove('spawning'), 320);

                const imgEl      = el.querySelector('.slide-img');
                const counterEl  = el.querySelector('.slide-counter');

                function go(n) {
                    idx = (idx + n + slides.length) % slides.length;
                    imgEl.src = slides[idx].src || slides[idx];
                    counterEl.textContent = `${idx + 1} / ${slides.length}`;
                }

                el.querySelector('.slide-nav-prev').addEventListener('click', () => go(-1));
                el.querySelector('.slide-nav-next').addEventListener('click', () => go(1));
                el.querySelector('.slide-close').addEventListener('click', e => {
                    e.stopPropagation();
                    el.classList.add('closing');
                    setTimeout(() => { el.remove(); delete openWins[`slides-${project.id}`]; }, 220);
                });

                // Drag
                el.addEventListener('mousedown', () => el.style.zIndex = ++topZ);
                let dragging = false, resizing = false, ox = 0, oy = 0, rw = 0, rh = 0;
                el.addEventListener('mousedown', e => {
                    if (e.target.closest('.slide-nav, .slide-close, .slide-resize')) return;
                    dragging = true;
                    ox = e.clientX + ws.scrollLeft - el.offsetLeft;
                    oy = e.clientY + ws.scrollTop  - el.offsetTop;
                    document.body.classList.add('dragging'); e.preventDefault();
                });
                el.querySelector('.slide-resize').addEventListener('mousedown', e => {
                    e.stopPropagation(); resizing = true;
                    ox = e.clientX; oy = e.clientY;
                    rw = el.offsetWidth; rh = el.offsetHeight;
                    document.body.classList.add('resizing'); e.preventDefault();
                });
                document.addEventListener('mousemove', e => {
                    if (dragging) {
                        el.style.left = Math.max(0, e.clientX + ws.scrollLeft - ox) + 'px';
                        el.style.top  = Math.max(0, e.clientY + ws.scrollTop  - oy) + 'px';
                    } else if (resizing) {
                        el.style.width  = Math.max(280, rw + e.clientX - ox) + 'px';
                        el.style.height = Math.max(200, rh + e.clientY - oy) + 'px';
                    }
                });
                document.addEventListener('mouseup', () => {
                    if (dragging) { dragging = false; document.body.classList.remove('dragging'); }
                    if (resizing) { resizing = false; document.body.classList.remove('resizing'); }
                });
            });
        }

        // ג"€ג"€ GALLERY WINDOW ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€
        function openGallery(project) {
            focusOrCreate(`gallery-${project.id}`, () => {
                const frame = makeFrame({ title: project.title + ' — Gallery', tag: 'Gallery', w: 500, h: 400, minW: 300, key: `gallery-${project.id}` });
                const body = frame.querySelector('.win-body');
                body.className += ' gallery-body';

                const primaryKey = `img-primary-${project.id}`;
                let secondaryCount = 0;

                function showGrid() {
                    body.innerHTML = `
                        <div class="gallery-grid">
                            ${project.images.map((img, i) => `
                                <div class="gallery-thumb" data-i="${i}">
                                    <img src="${img.src}" alt="${img.label}" loading="lazy">
                                    <div class="thumb-label">${img.label}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    body.querySelectorAll('.gallery-thumb').forEach(el => {
                        const i = parseInt(el.dataset.i);
                        el.addEventListener('click', () => {
                            const img = project.images[i];
                            const existing = openWins[primaryKey];
                            if (existing && existing.isConnected) {
                                swapImageContent(existing, img.src, img.label);
                            } else {
                                openImage({ src: img.src, label: img.label, key: primaryKey });
                            }
                        });
                        el.addEventListener('contextmenu', e => {
                            e.preventDefault();
                            const img = project.images[i];
                            openImage({ src: img.src, label: img.label, key: `img-sec-${project.id}-${++secondaryCount}` });
                        });
                    });
                }

                showGrid();
            });
        }

        // ג"€ג"€ TEXT WINDOW ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€
        // ── IMAGE VIEWER ──────────────────────────────────────────────────────
        function swapImageContent(el, src, label) {
            const img = el.querySelector('img');
            const title = el.querySelector('.img-float-title');
            img.src = src; img.alt = label;
            title.textContent = label;
            el.style.zIndex = ++topZ;
        }

        function openImage({ src, label = '', key }) {
            const ws = document.getElementById('workspace');
            const { x, y } = nextSpawn(220, 220);

            const el = document.createElement('div');
            el.className = 'img-float';
            el.style.cssText = `left:${x}px;top:${y}px;z-index:${++topZ};width:400px;height:300px;`;
            if (key) openWins[key] = el;

            el.innerHTML = `
                <img draggable="false" src="${src}" alt="${label}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;">
                <div class="img-float-bar">
                    <span class="img-float-title">${label}</span>
                    <span class="img-float-close">×</span>
                </div>
                <div class="img-float-chrome"></div>
                <div class="img-float-resize"></div>
            `;

            ws.appendChild(el);

            // Size to natural image dimensions once loaded
            const img = el.querySelector('img');
            img.addEventListener('load', () => {
                const maxW = window.innerWidth  * 0.80;
                const maxH = window.innerHeight * 0.75;
                const scale = Math.min(1, maxW / img.naturalWidth, maxH / img.naturalHeight);
                el.style.width  = Math.round(img.naturalWidth  * scale) + 'px';
                el.style.height = Math.round(img.naturalHeight * scale) + 'px';
            }, { once: true });

            el.addEventListener('mousedown', () => el.style.zIndex = ++topZ);

            el.querySelector('.img-float-close').addEventListener('click', e => {
                e.stopPropagation();
                el.classList.add('closing');
                setTimeout(() => { el.remove(); if (key) delete openWins[key]; }, 220);
            });

            // Drag
            let dragging = false, resizing = false, ox = 0, oy = 0, rw = 0, rh = 0;
            el.addEventListener('mousedown', e => {
                if (e.target.classList.contains('img-float-close') || e.target.classList.contains('img-float-resize')) return;
                dragging = true;
                ox = e.clientX + ws.scrollLeft - el.offsetLeft;
                oy = e.clientY + ws.scrollTop - el.offsetTop;
                document.body.classList.add('dragging'); e.preventDefault();
            });

            // Resize
            el.querySelector('.img-float-resize').addEventListener('mousedown', e => {
                e.stopPropagation();
                resizing = true;
                ox = e.clientX; oy = e.clientY;
                rw = el.offsetWidth; rh = el.offsetHeight;
                document.body.classList.add('resizing'); e.preventDefault();
            });

            document.addEventListener('mousemove', e => {
                if (dragging) {
                    el.style.left = Math.max(0, e.clientX + ws.scrollLeft - ox) + 'px';
                    el.style.top  = Math.max(0, e.clientY + ws.scrollTop - oy) + 'px';
                } else if (resizing) {
                    el.style.width  = Math.max(120, rw + e.clientX - ox) + 'px';
                    el.style.height = Math.max(80,  rh + e.clientY - oy) + 'px';
                }
            });
            document.addEventListener('mouseup', () => {
                if (dragging)  { dragging  = false; document.body.classList.remove('dragging'); }
                if (resizing)  { resizing  = false; document.body.classList.remove('resizing'); }
            });
        }

        // ג"€ג"€ 3D VIEWER ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€ג"€
        class SimpleOrbit {
            constructor(camera, el) {
                this.camera = camera; this.el = el;
                this.target = new THREE.Vector3();
                this.radius = camera.position.length();
                this.rotX = 0; this.rotY = 0; this.tRotX = 0; this.tRotY = 0;
                this.autoSpeed = 0.003; this.isOrbit = false; this.isPan = false;
                this.pX = 0; this.pY = 0;

                const skip = e => e.target.closest('.win-bottom-bar') || e.target.closest('.win-settings');
                this.el.addEventListener('contextmenu', e => e.preventDefault());
                this.el.addEventListener('mousedown', e => {
                    if (skip(e)) return;
                    if (e.button === 0) this.isOrbit = true;
                    if (e.button === 1 || e.button === 2) this.isPan = true;
                    this.pX = e.clientX; this.pY = e.clientY;
                });
                window.addEventListener('mousemove', e => {
                    const dx = e.clientX - this.pX, dy = e.clientY - this.pY;
                    if (this.isOrbit) {
                        this.tRotY += dx * 0.005; this.tRotX += dy * 0.005;
                        this.tRotX = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, this.tRotX));
                    }
                    if (this.isPan) {
                        const s = this.radius * 0.0012;
                        const fwd = new THREE.Vector3(); this.camera.getWorldDirection(fwd);
                        const right = new THREE.Vector3().crossVectors(fwd, this.camera.up).normalize();
                        const up = new THREE.Vector3().crossVectors(right, fwd).normalize();
                        this.target.addScaledVector(right, -dx * s);
                        this.target.addScaledVector(up, dy * s);
                    }
                    this.pX = e.clientX; this.pY = e.clientY;
                });
                window.addEventListener('mouseup', () => { this.isOrbit = false; this.isPan = false; });
                this.el.addEventListener('wheel', e => {
                    e.preventDefault();
                    this.radius = Math.max(0.3, Math.min(200, this.radius * (e.deltaY > 0 ? 1.1 : 0.9)));
                }, { passive: false });
            }
            update() {
                if (!this.isOrbit && !this.isPan) this.tRotY += this.autoSpeed;
                this.rotX += (this.tRotX - this.rotX) * 0.08;
                this.rotY += (this.tRotY - this.rotY) * 0.08;
                this.camera.position.x = this.target.x + this.radius * Math.sin(this.rotY) * Math.cos(this.rotX);
                this.camera.position.y = this.target.y + this.radius * Math.sin(this.rotX);
                this.camera.position.z = this.target.z + this.radius * Math.cos(this.rotY) * Math.cos(this.rotX);
                this.camera.lookAt(this.target);
            }
        }

        class AsciiEffect {
            constructor(renderer, chars, opts = {}) {
                this.renderer = renderer;
                this._chars = chars; this._inv = opts.invert || false; this._res = opts.resolution || 0.4;
                this.domElement = document.createElement('div');
                Object.assign(this.domElement.style, {
                    whiteSpace: 'pre', fontFamily: "'Courier New',Courier,monospace",
                    letterSpacing: '0.05em', color: opts.color || '#000',
                    backgroundColor: opts.bg || '#f5fccc', overflow: 'hidden',
                });
                this._c = document.createElement('canvas');
                this._x = this._c.getContext('2d');
                this._w = 0; this._h = 0;
            }
            get characters() { return this._chars; } set characters(v) { this._chars = v; }
            get invert() { return this._inv; } set invert(v) { this._inv = v; }
            get resolution() { return this._res; } set resolution(v) { this._res = v; if (this._w) this.setSize(this._w, this._h); }
            setSize(w, h) {
                this._w = w; this._h = h;
                this._c.width  = Math.max(1, Math.floor(w * this._res));
                this._c.height = Math.max(1, Math.floor(h * this._res));
                this.renderer.setSize(w, h);
                const cols = this._c.width, rows = Math.ceil(this._c.height / 2);
                const fs = Math.max(0.4, Math.min(w / (cols * 0.601), h / rows));
                this.domElement.style.fontSize = fs.toFixed(2) + 'px';
                this.domElement.style.lineHeight = (h / rows / fs).toFixed(3);
            }
            render(scene, camera) {
                this.renderer.render(scene, camera);
                const cW = this._c.width, cH = this._c.height;
                this._x.clearRect(0, 0, cW, cH);
                this._x.drawImage(this.renderer.domElement, 0, 0, cW, cH);
                const d = this._x.getImageData(0, 0, cW, cH).data, ch = this._chars, inv = this._inv;
                let s = '';
                for (let y = 0; y < cH; y += 2) {
                    for (let x = 0; x < cW; x++) {
                        const i = (y * cW + x) * 4;
                        let b = (0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2]) / 255;
                        if (inv) b = 1 - b;
                        s += ch[Math.min(Math.floor(b * (ch.length - 1)), ch.length - 1)];
                    }
                    s += '\n';
                }
                this.domElement.textContent = s;
            }
        }

        function normalizeModel(group, targetSize = 3) {
            const box = new THREE.Box3().setFromObject(group);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            group.position.sub(center);
            group.scale.multiplyScalar(targetSize / Math.max(size.x, size.y, size.z));
            const box2 = new THREE.Box3().setFromObject(group);
            group.position.sub(box2.getCenter(new THREE.Vector3()));
        }

                const wireEdgeMat  = new LineMaterial({ color: 0x000000, linewidth: 1, worldUnits: false, resolution: new THREE.Vector2(vw, vh) });

                let modelGroup = null, edgeMeshes = [], wireFillMeshes = [];

                        loadUrl = URL.createObjectURL(new Blob([bytes], { type: 'model/gltf-binary' }));

                            const fm = new THREE.Mesh(child.geometry, new THREE.MeshBasicMaterial({

        function orderWindows() {
            const ws  = document.getElementById('workspace');
            const sw  = window.innerWidth, sh = window.innerHeight;
            const gap = 8,  leftX = 28, topY = 28;

            // Pin menu top-left
            const menuEl = document.getElementById('menu-body-inner')?.closest('.win-frame');
            if (menuEl) { menuEl.style.left = leftX + 'px'; menuEl.style.top = topY + 'px'; menuEl.style.zIndex = ++topZ; }

            // Pin theme below menu
            const themeFrame = openWins['theme'];
            const menuBottom = menuEl ? menuEl.offsetTop + menuEl.offsetHeight : topY;
            const leftColW   = menuEl ? menuEl.offsetWidth + gap : 228 + gap;
            if (themeFrame) {
                themeFrame.style.left = leftX + 'px';
                themeFrame.style.top  = (menuBottom + gap) + 'px';
                themeFrame.style.zIndex = ++topZ;
            }

            // Collect all movable windows + floating images
            const frames = [...ws.querySelectorAll('.win-frame')].filter(f => f !== menuEl && f !== themeFrame);
            const floats = [...ws.querySelectorAll('.img-float')];
            const all    = [...frames, ...floats];
            if (!all.length) return;

            // Weight determines relative area: heavier = more space
            function weight(f) {
                if (f.classList.contains('img-float')) return 1.5;
                if (f.querySelector('.viewer-wrap')) return 4;
                if (f.querySelector('.gallery-body')) {
                    const n = f.querySelectorAll('.gallery-thumb').length || 1;
                    return n <= 2 ? 1.5 : n <= 6 ? 2.5 : 4;
                }
                return 1;
            }
            const totalW = arr => arr.reduce((s, f) => s + weight(f), 0);

            // Sort heaviest first so large windows anchor the layout
            all.sort((a, b) => weight(b) - weight(a));

            // BSP: recursively fill rect with windows
            function bsp(rect, wins) {
                if (!wins.length) return;

                if (wins.length === 1) {
                    const f = wins[0];
                    const w = Math.max(f.classList.contains('img-float') ? 120 : 260, rect.w);
                    const h = Math.max(f.classList.contains('img-float') ? 80  : 180, rect.h);
                    Object.assign(f.style, {
                        left: rect.x + 'px', top: rect.y + 'px',
                        width: w + 'px', height: h + 'px', zIndex: ++topZ
                    });
                    f.dispatchEvent(new CustomEvent('win-resize'));
                    return;
                }

                // Split: along the longer axis
                const splitH = rect.w >= rect.h;
                const half   = Math.ceil(wins.length / 2);
                const left   = wins.slice(0, half);
                const right  = wins.slice(half);
                const ratio  = totalW(left) / totalW(wins);

                if (splitH) {
                    const cut = Math.round(rect.x + (rect.w - gap) * ratio);
                    bsp({ x: rect.x,     y: rect.y, w: cut - rect.x,                    h: rect.h }, left);
                    bsp({ x: cut + gap,  y: rect.y, w: rect.x + rect.w - cut - gap,     h: rect.h }, right);
                } else {
                    const cut = Math.round(rect.y + (rect.h - gap) * ratio);
                    bsp({ x: rect.x, y: rect.y,     w: rect.w, h: cut - rect.y               }, left);
                    bsp({ x: rect.x, y: cut + gap,  w: rect.w, h: rect.y + rect.h - cut - gap }, right);
                }
            }

            const areaX = leftX + leftColW;
            bsp({ x: areaX, y: topY, w: sw - areaX - gap, h: sh - topY - gap }, all);
        }

                    <div class="proj-row" data-static="about"><span class="proj-name">About</span></div>
                    <div class="proj-row" data-static="cv"><span class="proj-name">CV</span></div>
                    <div class="proj-row" data-static="contact"><span class="proj-name">Contact</span></div>
                    <hr class="menu-rule">
                    <div class="proj-row" style="gap:8px;">
                        <span class="proj-name" data-action="theme" style="cursor:pointer;">Theme</span>
                        <span style="font-size:0.5rem;opacity:0.25;user-select:none;">&#xb7;</span>
                        <span class="proj-name" data-action="arrange" style="cursor:pointer;">Arrange</span>
                    </div>
                </div>
            `;

            ws.appendChild(frame);
            frame.addEventListener('mousedown', () => frame.style.zIndex = ++topZ);

            // Per-category collapse
            frame.querySelectorAll('.menu-cat-toggle').forEach(toggle => {
                const cat = toggle.dataset.cat;
                const list = frame.querySelector(`[data-cat-list="${cat}"]`);
                const icon = toggle.querySelector('.cat-icon');
                let open = true;
                toggle.addEventListener('click', () => {
                    open = !open;
                    list.style.display = open ? '' : 'none';
                    icon.textContent = open ? String.fromCharCode(8722) : '+';
                });
            });

            // Window collapse
            let collapsed = false;
            const body = frame.querySelector('#menu-body-inner');
            const toggleBtn = frame.querySelector('.menu-collapse');
            function toggleCollapse() {
                collapsed = !collapsed;
                body.style.display = collapsed ? 'none' : '';
                toggleBtn.textContent = collapsed ? '+' : String.fromCharCode(8722);
            }
            frame._toggleCollapse = toggleCollapse;
            frame._collapsed = () => collapsed;
            toggleBtn.addEventListener('click', e => { e.stopPropagation(); toggleCollapse(); });
            frame.querySelector('.win-titlebar').addEventListener('dblclick', toggleCollapse);

            // Drag
            const tb = frame.querySelector('.win-titlebar');
            let dragging = false, ox = 0, oy = 0;
            tb.addEventListener('mousedown', e => {
                if (e.target === toggleBtn) return;
                dragging = true;
                ox = e.clientX - frame.offsetLeft;
                oy = e.clientY - frame.offsetTop;
                document.body.classList.add('dragging'); e.preventDefault();
            });
            document.addEventListener('mousemove', e => {
                if (!dragging) return;
                frame.style.left = Math.max(0, e.clientX - ox) + 'px';
                frame.style.top  = Math.max(0, e.clientY - oy) + 'px';
            });
            document.addEventListener('mouseup', () => {
                if (dragging) { dragging = false; document.body.classList.remove('dragging'); }
            });

            frame.querySelectorAll('.proj-row[data-id]').forEach(el => {
                const project = PROJECTS.find(p => p.id === el.dataset.id);
                if (project) el.addEventListener('click', () => openInfo(project));
            });
            frame.querySelectorAll('.proj-row[data-static]').forEach(el => {
                el.addEventListener('click', () => openText(el.dataset.static));
            });
            frame.querySelectorAll('[data-action]').forEach(el => {
                const action = el.dataset.action;
                if (action === 'theme') el.addEventListener('click', () => openTheme());
                if (action === 'arrange') el.addEventListener('click', () => orderWindows());
            });
        }
        buildMenuWindow();
        openTheme();
        requestAnimationFrame(() => {
            const themeFrame = openWins['theme'];
            const menuEl = document.querySelector('.win-frame');
            if (themeFrame && menuEl) {
                themeFrame.style.left = '28px';
                themeFrame.style.top  = (menuEl.offsetTop + menuEl.offsetHeight + 8) + 'px';
            }
        });

        // Restore saved theme preferences on load
        const savedScale = parseFloat(localStorage.getItem('dellus-font-scale'));
        if (!isNaN(savedScale)) document.documentElement.style.setProperty('--font-scale', savedScale);
        const savedBg = localStorage.getItem('dellus-bg');
        if (savedBg) document.documentElement.style.setProperty('--bg', savedBg);
        const savedFg = localStorage.getItem('dellus-fg');
        if (savedFg) {
            document.documentElement.style.setProperty('--fg', savedFg);
            document.documentElement.style.setProperty('--border-strong', savedFg);
        }
        const savedFontId = localStorage.getItem('dellus-font-id');
        if (savedFontId) {
            const savedFont = FONTS.find(f => f.id === savedFontId);
            if (savedFont) {
                document.documentElement.style.setProperty('--font-family', savedFont.family);
                document.documentElement.style.setProperty('--font-var', savedFont.varSet);
            }
        }

        document.getElementById('err-banner').style.display = 'none';

    </script>
    <script>
        window.addEventListener('error', e => {
            const b = document.getElementById('err-banner');
            if (b) { b.style.display = 'block'; b.textContent = 'JS ERROR: ' + e.message + '\n' + (e.filename||'') + ':' + e.lineno; }
        });
        window.addEventListener('unhandledrejection', e => {
            const b = document.getElementById('err-banner');
            if (b) { b.style.display = 'block'; b.textContent = 'MODULE ERROR: ' + (e.reason && e.reason.message ? e.reason.message : e.reason); }
        });
    </script>
</body>
</html>
